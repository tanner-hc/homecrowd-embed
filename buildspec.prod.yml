version: 0.2

env:
  variables:
    NODE_ENV: "production"

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - npm ci
  build:
    commands:
      - echo "Building Vite app for production"
      - npm run build
  post_build:
    commands:
      - echo "Syncing dist/ to s3://embed.gethomecrowd.com"
      - aws s3 sync dist/ s3://embed.gethomecrowd.com --delete
      - echo "Invalidating CloudFront cache"
      - aws cloudfront create-invalidation --distribution-id ELZNV5AQX462U --paths "/*"

cache:
  paths:
    - '/root/.npm/**/*'
